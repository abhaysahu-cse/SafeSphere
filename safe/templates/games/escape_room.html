<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Fire Evacuation Simulation</title>
<style>
body {margin:0; overflow:hidden; font-family:Arial;}
#hud {position:absolute; left:10px; top:10px; background:rgba(0,0,0,0.6); color:#fff; padding:8px; border-radius:8px;}
#countdown {position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:48px; background:rgba(0,0,0,0.7); color:orange; padding:20px; border-radius:12px; display:none;}
#message {position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); font-size:28px; background:rgba(0,0,0,0.7); color:white; padding:12px; border-radius:10px; display:none;}
#restart {position:absolute; top:72%; left:50%; transform:translate(-50%,-50%); padding:8px 12px; border-radius:6px; border:none; background:#28a745; color:#fff; cursor:pointer; display:none;}
</style>
</head>
<body>
<a href="{% url 'games' %}" 
   style="
      position:absolute;
      top:20px;
      right:20px;
      background:#333;
      color:white;
      padding:10px 16px;
      border-radius:8px;
      text-decoration:none;
      font-size:16px;">
   ⬅ Back
</a>

    {% comment %} padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom); {% endcomment %}


<div id="hud">Time: <span id="timer">0</span>s | Score: <span id="score">0</span></div>
<div id="countdown"></div>
<div id="message"></div>
<button id="restart">Restart</button>

<!-- Fire sound -->
<audio id="fireSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1c8b122934.mp3?filename=fire-ambient-12275.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// -------------------- Scene Setup --------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dirLight = new THREE.DirectionalLight(0xffffff,0.6);
dirLight.position.set(5,10,5);
scene.add(dirLight);

// Floor & Walls
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,14), new THREE.MeshStandardMaterial({color:0xe6e6e6}));
floor.rotation.x = -Math.PI/2; scene.add(floor);
const wallMat = new THREE.MeshStandardMaterial({color:0xd8d8d8});
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(20,6), wallMat); backWall.position.set(0,3,-7); scene.add(backWall);
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(14,6), wallMat); leftWall.position.set(-10,3,0); leftWall.rotation.y = Math.PI/2; scene.add(leftWall);

// Exit Door
const door = new THREE.Mesh(new THREE.BoxGeometry(1.4,2.4,0.2), new THREE.MeshStandardMaterial({color:0x3333aa}));
door.position.set(9.2,1.2,0); scene.add(door);

// Desk/Chair Grid
const desks = [];
for(let r=-2;r<=2;r++){
  for(let c=-3;c<=1;c++){
    const desk = new THREE.Mesh(new THREE.BoxGeometry(1.6,0.6,1), new THREE.MeshStandardMaterial({color:0x8b4513}));
    desk.position.set(c*2 + 0.5,0.3,r*2); scene.add(desk); desks.push(desk);
    const chair = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.7), new THREE.MeshStandardMaterial({color:0x4444ff}));
    chair.position.set(c*2 + 2,0.35,r*2); scene.add(chair);
  }
}

// Student
const student = new THREE.Group();
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.9,12), new THREE.MeshStandardMaterial({color:0xffcc99}));
body.position.y = 0.5;
const head = new THREE.Mesh(new THREE.SphereGeometry(0.22,12,12), new THREE.MeshStandardMaterial({color:0xffe0bd}));
head.position.y = 1.05;
student.add(body); student.add(head); student.position.set(-8,0,0); scene.add(student);

camera.position.set(0,8,12); camera.lookAt(0,0,0);

// -------------------- Fire System --------------------
const grid = {}, fireObjects = [], cell=1.2;
function gridKey(ix,iz){ return ix+','+iz; }
function worldToCell(x,z){ return {ix:Math.round((x+10)/cell), iz:Math.round((z+7)/cell)}; }
function cellToWorld(ix,iz){ return {x:ix*cell-10, z:iz*cell-7}; }

function igniteCell(ix,iz){
  const key = gridKey(ix,iz); if(grid[key] && grid[key].burning) return;
  const pos = cellToWorld(ix,iz);
  const flame = new THREE.Mesh(new THREE.BoxGeometry(cell*0.9,0.9,cell*0.9), new THREE.MeshStandardMaterial({color:0xff6600, transparent:true, opacity:0.9, emissive:0xff2200}));
  flame.position.set(pos.x,0.45,pos.z); scene.add(flame);
  grid[key] = {burning:true, heat:1.0, obj:flame, spreadTimer:0}; fireObjects.push(grid[key]);
}

function updateFire(dt){
  const toSpread = [];
  fireObjects.forEach(cellObj=>{
    cellObj.spreadTimer += dt; cellObj.heat=Math.min(1.5, cellObj.heat + dt*0.02);
    if(cellObj.spreadTimer>1){
      cellObj.spreadTimer=0;
      const ix = Math.round((cellObj.obj.position.x + 10)/cell);
      const iz = Math.round((cellObj.obj.position.z + 7)/cell);
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(n=>{
        const nx=ix+n[0], nz=iz+n[1]; const key=gridKey(nx,nz);
        if(!grid[key] && Math.random()<0.6) toSpread.push({ix:nx,iz:nz});
      });
    }
    const t = 1 + Math.sin(Date.now()*0.01 + cellObj.obj.position.x + cellObj.obj.position.z)*0.12;
    cellObj.obj.scale.y = 0.9*t;
    cellObj.obj.material.opacity = 0.6 + Math.sin(Date.now()*0.02 + cellObj.obj.position.x)*0.3;
    cellObj.obj.material.emissiveIntensity = 0.6 + Math.random()*0.4;
  });
  toSpread.forEach(s=>igniteCell(s.ix,s.iz));
}

// Smoke
const smokeParticles = [];
function spawnSmoke(x,z){
  const sph = new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8), new THREE.MeshStandardMaterial({color:0x666666, transparent:true, opacity:0.6}));
  sph.position.set(x,0.9,z); scene.add(sph); smokeParticles.push({obj:sph,life:1.5});
}
function updateSmoke(dt){ for(let i=smokeParticles.length-1;i>=0;i--){ const p=smokeParticles[i]; p.life-=dt; p.obj.position.y+=dt*0.6; p.obj.material.opacity=Math.max(0,p.life/1.5*0.6); if(p.life<=0){ scene.remove(p.obj); smokeParticles.splice(i,1);} } }

// -------------------- Game Logic --------------------
let countdownSeconds=1, fireStarted=false, timer=0, score=0, safe=false, gameOver=false;
const timerEl=document.getElementById('timer');
const scoreEl=document.getElementById('score');
const countdownEl=document.getElementById('countdown');
const messageEl=document.getElementById('message');
const restartBtn=document.getElementById('restart');
const fireSound = document.getElementById('fireSound');

function startCountdown(sec){
  countdownSeconds = sec; countdownEl.style.display='block';
  countdownEl.innerText='Fire in '+countdownSeconds;
  const interval=setInterval(()=>{
    countdownSeconds--;
    if(countdownSeconds>0) countdownEl.innerText='Fire in '+countdownSeconds;
    else{ clearInterval(interval); countdownEl.style.display='none'; startFire(); }
  },1000);
}

function startFire(){
  fireStarted=true; igniteCell(-7,-3); igniteCell(-5,-2);
  fireSound.currentTime=0; fireSound.play();
}

// Controls
window.addEventListener('keydown',(e)=>{ if(gameOver) return; const step=0.26;
  if(e.key==='ArrowLeft') student.position.x-=step;
  if(e.key==='ArrowRight') student.position.x+=step;
  if(e.key==='ArrowUp') student.position.z-=step;
  if(e.key==='ArrowDown') student.position.z+=step;
  student.position.x=Math.max(-9.5, Math.min(9.5, student.position.x));
  student.position.z=Math.max(-6.5, Math.min(6.5, student.position.z));
});

// Check exit
function checkExit(){ const d=Math.hypot(student.position.x-door.position.x, student.position.z-door.position.z);
  if(d<1.2 && !gameOver){ safe=true; gameOver=true; score=Math.max(0,200-Math.round(timer*10)); scoreEl.innerText=score; showMessage('You escaped! Score: '+score); }
}

// Fire collision
function checkFireCollision(){ const {ix,iz}=worldToCell(student.position.x,student.position.z); const key=gridKey(ix,iz);
  if(grid[key] && grid[key].burning && !gameOver){ gameOver=true; showMessage("You were caught by fire! Game Over"); }
}

// Message
function showMessage(text){ messageEl.style.display='block'; messageEl.innerText=text; restartBtn.style.display='block'; }

// Restart
restartBtn.addEventListener('click', ()=>{
  fireObjects.forEach(f=>scene.remove(f.obj)); fireObjects.length=0;
  Object.keys(grid).forEach(k=>delete grid[k]);
  smokeParticles.forEach(s=>scene.remove(s.obj)); smokeParticles.length=0;
  messageEl.style.display='none'; restartBtn.style.display='none';
  student.position.set(-8,0,0);
  timer=0; score=0; scoreEl.innerText=score; timerEl.innerText=timer;
  safe=false; gameOver=false; fireStarted=false;
  startCountdown(1);
});

// Timer
setInterval(()=>{ if(fireStarted && !gameOver) timer++; timerEl.innerText=timer; },1000);

// Start countdown
startCountdown(1);

// Animate
let last = performance.now();
function animate(){ requestAnimationFrame(animate);
  const now=performance.now(); const dt=(now-last)/1000; last=now;
  if(fireStarted && !gameOver){ updateFire(dt); updateSmoke(dt); checkFireCollision(); checkExit(); desks.forEach((d,i)=>{ d.rotation.y=Math.sin(now*0.001+i)*0.01; });
    if(Math.random()<0.3) fireObjects.forEach(f=>spawnSmoke(f.obj.position.x+(Math.random()-0.5)*0.2, f.obj.position.z+(Math.random()-0.5)*0.2));
  }
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
