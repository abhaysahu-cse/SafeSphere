{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeLearn - Learning Modules</title>
    <meta name="description" content="Browse and complete disaster preparedness learning modules">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- GLOBAL BACKGROUND (place immediately after <body>) -->
<div class="site-bg" aria-hidden="true" role="presentation">
  <!-- preload hint (optional) -->
  <link rel="preload" href="{% static 'bg/site-bg.mp4' %}" as="video" type="video/mp4">

  <video class="site-bg-video"
         autoplay
         muted
         loop
         playsinline
         preload="metadata"
         poster="{% static 'bg/site-bg.png' %}"
         aria-hidden="true"
         tabindex="-1">
    <source src="{% static 'bg/site-bg.mp4' %}" type="video/mp4">
    <!-- fallback image for very old browsers -->
  </video>

  <div class="site-bg-overlay" aria-hidden="true" role="presentation"></div>
</div>


    <!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">SafeSphere</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <span class="toggle-icon">☰</span>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'index' %}" class="nav-link active">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Dashboard</span>
        </a>
        <a href="{% url 'learn' %}" class="nav-link">
            <span class="nav-icon">📚</span>
            <span class="nav-text">Learn</span>
        </a>
        <a href="{% url 'games' %}" class="nav-link">
            <span class="nav-icon">🎮</span>
            <span class="nav-text">Games</span>
        </a>
        <a href="{% url 'drills' %}" class="nav-link">
            <span class="nav-icon">🚨</span>
            <span class="nav-text">Drills</span>
        </a>
         <a href="{% url 'protect' %}" class="nav-link">
            <span class="nav-icon">🏡</span>
            <span class="nav-text">Protect Home, Farm & Livelihood</span>
        </a>
        <a href="{% url 'emergency' %}" class="nav-link emergency-link">
            <span class="nav-icon">🆘</span>
            <span class="nav-text">Emergency</span>
        </a>
        <a href="{% url 'chat' %}" class="nav-link">
            <span class="nav-icon">💬</span>
            <span class="nav-text">AI Assistant</span>
        </a>
        
        <!-- Weather page -->
        <a href="{% url 'weather' %}" class="nav-link">
            <span class="nav-icon">🌦</span>
            <span class="nav-text">Weather</span>
        </a>
        <!-- Map page -->
        <a href="{% url 'map' %}" class="nav-link">
            <span class="nav-icon">🗺️</span>
            <span class="nav-text">Safety Map</span>
        </a>
        <a href="{% url 'profile' %}" class="nav-link">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Profile</span>
        </a>

    </nav>
</aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <div class="header-content">
                <h1 class="page-title">Learning Modules 📚</h1>
                <p class="page-subtitle">Master disaster preparedness one module at a time</p>
            </div>
        </header>

        <!-- Filter Tabs -->
        <div class="filter-tabs animate-fade-up">
            <button class="filter-tab active" data-filter="all">All Modules</button>
            <button class="filter-tab" data-filter="beginner">Beginner</button>
            <button class="filter-tab" data-filter="intermediate">Intermediate</button>
            <button class="filter-tab" data-filter="advanced">Advanced</button>
        </div>

        <!-- Modules Grid -->
        <section class="section">
            <div class="learn-modules-grid" id="modulesGrid">
                <!-- Modules will be generated by JS -->
            </div>
        </section>
    </main>

    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script>
        // Module data
        const modules = [
            {
                id: 'Earthquake_Safety',
                title: 'Earthquake Safety Basics',
                description: 'Learn essential earthquake preparedness and response techniques',
                icon: '🌍',
                difficulty: 'beginner',
                duration: 15,
                progress: 65,
                xp: 100
            },
            {
                id: 'fire_sefty',
                title: 'Fire Safety',
                description: 'Prevention and response strategies for fire emergencies',
                icon: '🔥',
                difficulty: 'beginner',
                duration: 15,
                progress: 100,
                xp: 100
            },
            {
                id: 'flood-response',
                title: 'Flood Response',
                description: 'Stay safe during flooding events and water emergencies',
                icon: '🌊',
                difficulty: 'intermediate',
                duration: 20,
                progress: 40,
                xp: 150
            },
            {
                id: 'hurricane-prep',
                title: 'Hurricane Preparation',
                description: 'Before, during, and after hurricane safety protocols',
                icon: '💨',
                difficulty: 'beginner',
                duration: 18,
                progress: 0,
                xp: 120
            },
            {
                id: 'first-aid',
                title: 'Emergency First Aid',
                description: 'Critical first aid techniques for disaster scenarios',
                icon: '🏥',
                difficulty: 'intermediate',
                duration: 25,
                progress: 20,
                xp: 180
            },
            {
                id: 'tornado-safety',
                title: 'Tornado Safety',
                description: 'Recognize warnings and take shelter effectively',
                icon: '🌪️',
                difficulty: 'beginner',
                duration: 12,
                progress: 0,
                xp: 90
            },
            {
                id: 'winter-storms',
                title: 'Winter Storm Survival',
                description: 'Navigate extreme cold and snow emergencies',
                icon: '❄️',
                difficulty: 'intermediate',
                duration: 22,
                progress: 0,
                xp: 160
            },
            {
                id: 'wildfire-escape',
                title: 'Wildfire Evacuation',
                description: 'Plan and execute safe evacuation during wildfires',
                icon: '🔥',
                difficulty: 'advanced',
                duration: 30,
                progress: 0,
                xp: 200
            },
            {
                id: 'emergency-kit',
                title: 'Emergency Kit Essentials',
                description: 'Build a comprehensive 72-hour emergency kit',
                icon: '🎒',
                difficulty: 'beginner',
                duration: 10,
                progress: 80,
                xp: 80
            },
            {
                id: 'communication',
                title: 'Emergency Communication',
                description: 'Maintain contact during infrastructure failures',
                icon: '📡',
                difficulty: 'intermediate',
                duration: 18,
                progress: 0,
                xp: 140
            },
            
            {
                id: 'HeatWave-safety',
                title: 'Heat Wave Safety Planning',
                description: 'Protect yourself and others during extreme heat events',
                icon: '🔥🌡️',
                difficulty: 'beginner',
                duration: 12,
                progress: 0,
                xp: 85
            }
        ];

        // Load module progress from localStorage
        function loadModuleProgress() {
            const savedProgress = localStorage.getItem('moduleProgress');
            if (savedProgress) {
                const progressData = JSON.parse(savedProgress);
                modules.forEach(module => {
                    if (progressData[module.id] !== undefined) {
                        module.progress = progressData[module.id];
                    }
                });
            }
        }

        // Save module progress
        function saveModuleProgress(moduleId, progress) {
            const savedProgress = localStorage.getItem('moduleProgress');
            const progressData = savedProgress ? JSON.parse(savedProgress) : {};
            progressData[moduleId] = progress;
            localStorage.setItem('moduleProgress', JSON.stringify(progressData));
        }

        // Render modules
        function renderModules(filter = 'all') {
            loadModuleProgress();
            const grid = document.getElementById('modulesGrid');
            const filteredModules = filter === 'all' 
                ? modules 
                : modules.filter(m => m.difficulty === filter);

            grid.innerHTML = filteredModules.map(module => `
                <div class="learn-module-card animate-fade-up" data-difficulty="${module.difficulty}">
                    <div class="module-header">
                        <span class="module-icon">${module.icon}</span>
                        <span class="module-tag tag-${module.difficulty}">${module.difficulty}</span>
                    </div>
                    <h3 class="module-title">${module.title}</h3>
                    <p class="module-description">${module.description}</p>
                    <div class="module-meta">
                        <span class="meta-item">⏱️ ${module.duration} min</span>
                        <span class="meta-item">⭐ ${module.xp} XP</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${module.progress}%"></div>
                    </div>
                    <p class="progress-text">${module.progress}% complete</p>


 <button class="btn btn-primary" onclick="openModule('${module.id}')">
    Play Now →
</button>


                </div>
            `).join('');
        }



      function openModule(moduleId) {

    if (moduleId === 'fire_sefty') {
        window.location.href = "{% url 'fire_sefty_modules' %}";
    }

    else if (moduleId === 'flood-response') {
        window.location.href = "{% url 'flood' %}";
    }
    
    else if (moduleId === 'Earthquake_Safety') {
        window.location.href = "{% url 'Earthquake_Safety' %}";
    }

    else if (moduleId === 'wildfire-escape') {
        window.location.href = "{% url 'FireSafety' %}";
    }
    
    
    else if (moduleId === 'hurricane-prep') {
        window.location.href = "{% url 'Cyclone_Safety' %}";
    }

    else if (moduleId === 'first-aid') {
        window.location.href = "{% url 'Firstaid' %}";
    }
}

        // Start or continue module
        function startModule(moduleId, currentProgress) {
            const module = modules.find(m => m.id === moduleId);
            if (!module) return;

            // Simulate progress increase
            const newProgress = Math.min(currentProgress + 10, 100);
            saveModuleProgress(moduleId, newProgress);
            
            // Update XP
            if (newProgress > currentProgress) {
                const currentXP = parseInt(localStorage.getItem('totalXP') || '2450');
                localStorage.setItem('totalXP', currentXP + 10);
            }

            // Show feedback
            alert(`📚 ${module.title}\n\nProgress: ${newProgress}%\n${newProgress === 100 ? '🎉 Module completed! +' + module.xp + ' XP' : '+10 XP earned!'}`);
            
            renderModules();
        }

        // Filter functionality
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderModules(tab.dataset.filter);
            });
        });

        // Initial render
        renderModules();
    </script>
</body>
</html>
