<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SafeSphere — Farm Flood</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
  <script src="./app.js?v=1"></script>
  <style>
    html,body{height:100%;margin:0;background:#000;font-family:Arial}
    .hint{position:fixed;left:10px;top:10px;background:#fff;padding:8px;border-radius:8px;z-index:10}
    #card{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:92%;max-width:520px;background:#fff;padding:12px;border-radius:12px;display:none;z-index:10}
  </style>
</head>
<body>
  <div class="hint">Allow camera & point at HIRO marker</div>
  <div id="card"><strong id="statusTitle">Farm Flood</strong><div id="statusText">Point at marker, press Start</div>
    <div style="margin-top:10px;display:flex;gap:10px;">
      <button id="start">Start Flood</button>
      <button id="reset">Reset</button>
    </div>
  </div>

  <a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false" vr-mode-ui="enabled:false">
    <a-assets>
      <a-asset-item id="cow" src="../../models/cow.glb"></a-asset-item>
      <a-asset-item id="boy" src="../../models/boy.glb"></a-asset-item>
      <!-- fallback small water plane model not required (we create a plane) -->
    </a-assets>

    <a-marker preset="hiro" id="marker" emitevents="true" smooth="true" smoothCount="8" smoothTolerance="0.02">
      <a-entity id="root" visible="false">

        <!-- small farm: cow + boy -->
        <a-entity id="cowEnt" gltf-model="#cow" position="0.12 0 0.25" rotation="0 180 0" scale="0.25 0.25 0.25"></a-entity>
        <a-entity id="boyEnt" gltf-model="#boy" position="-0.25 0 0.2" scale="0.2 0.2 0.2"></a-entity>

        <!-- water plane - initially tiny scaleY -->
        <a-box id="water" position="0 0.01 0" depth="1.2" height="0.02" width="1.2"
               material="color:#3b82f6;opacity:0.6;transparent:true"></a-box>

        <!-- optional ground -->
        <a-plane rotation="-90 0 0" width="1.4" height="1.4" color="#6b8a3d" position="0 0 0"></a-plane>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
