<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SafeSphere AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }
    .hint {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    
  </style>
</head>

<body>
  <div class="hint">
    Allow camera access<br>
    Show HIRO marker to camera
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false">

    <!-- HIRO marker -->
    <a-marker type="pattern" url="marker/hiro.patt">

      <!-- 3D MODEL (optional) -->
      <a-entity
        gltf-model="models/extinguisher.glb"
        scale="0.5 0.5 0.5"
        position="0 0 0">
      </a-entity>

      <!-- Fallback BOX -->
      <a-box
        color="#ff3333"
        position="0 0.3 0"
        height="0.6"
        width="0.3"
        depth="0.3"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-box>

      <a-text
        value="Fire Safety\nUse extinguisher\nAim at base"
        align="center"
        position="-0.7 1 0"
        width="2"
        color="#ffffff">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
